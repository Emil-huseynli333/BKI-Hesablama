<!DOCTYPE html>
<html lang="az">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik BKİ Hesablayıcı | Onlayn Çəki Analizi</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7563994232518889" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary-green: #4e7d5e;
            --secondary-gray: #6c757d;
            --bg-light: #f4f7f6;
            --border-color: #e2e8f0;
            --text-main: #2d3748;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .lang-bar { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .lang-btn { padding: 8px 16px; border: 1px solid var(--border-color); background: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .lang-btn.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }

        .app-container {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 { text-align: center; font-size: 28px; margin-bottom: 30px; color: #1a202c; border-bottom: 3px solid var(--primary-green); padding-bottom: 15px; }

        .unit-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .unit-btn { padding: 6px 12px; border: 1px solid var(--border-color); background: #f8fafc; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .unit-btn.active { background: var(--secondary-gray); color: white; }

        .input-row { margin-bottom: 20px; }
        .input-row label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 15px; }
        .input-row input { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .input-row input:focus { border-color: var(--primary-green); box-shadow: 0 0 0 4px rgba(78, 125, 94, 0.1); }
        
        .dual-inputs { display: flex; gap: 10px; }

        .btn-box { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--primary-green); color: white; }
        .btn-main:hover { background: #3d634a; transform: translateY(-2px); }
        .btn-alt { background: var(--secondary-gray); color: white; }

        .result-panel { margin-top: 35px; text-align: center; padding-top: 30px; border-top: 1px solid #edf2f7; display: none; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bmi-val { font-size: 56px; font-weight: 900; color: var(--primary-green); margin: 10px 0; }
        .bmi-cat { font-size: 22px; font-weight: 700; margin-bottom: 25px; }

        .gauge-wrapper { position: relative; width: 100%; height: 40px; margin-top: 35px; }
        .gauge-bar { width: 100%; height: 25px; border-radius: 12px; display: flex; overflow: hidden; }
        .gauge-labels { position: absolute; top: -25px; width: 100%; font-size: 12px; font-weight: bold; color: #718096; display: flex; justify-content: space-between; }
        .ptr { position: absolute; top: -5px; width: 5px; height: 35px; background: #2d3748; border: 2px solid white; border-radius: 10px; transition: left 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }

        .scientific-content { width: 100%; max-width: 850px; margin-top: 30px; }
        .article-card { background: white; padding: 45px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); line-height: 1.8; }
        .article-card h2 { color: var(--primary-green); font-size: 24px; margin-top: 35px; border-left: 6px solid var(--primary-green); padding-left: 20px; }
        .article-card h3 { color: #2d3748; margin-top: 25px; }
        .article-card p, .article-card li { font-size: 16px; color: #4a5568; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin: 30px 0; font-size: 15px; }
        th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid #edf2f7; color: var(--primary-green); }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; }

        .math-box { background: #f0fdf4; padding: 25px; border-radius: 15px; border: 1px solid #dcfce7; font-family: 'Courier New', monospace; font-weight: bold; text-align: center; margin: 25px 0; }
        
        .footer-note { font-size: 13px; color: #a0aec0; text-align: center; margin: 50px 0; line-height: 1.5; max-width: 700px; }
        .ad-spacer { margin: 30px 0; width: 100%; max-width: 650px; text-align: center; min-height: 100px; }
    </style>
</head>
<body>

<div class="lang-bar">
    <button class="lang-btn active" id="btn-az" onclick="setLang('az')">Azərbaycan</button>
    <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">Русский</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
</div>

<div class="app-container">
    <h1 id="t-h1">BKİ Hesablayıcı</h1>

    <div class="unit-toggle">
        <button class="unit-btn active" id="u-metric" onclick="setUnit('metric')">Metric (cm/kg)</button>
        <button class="unit-btn" id="u-imperial" onclick="setUnit('imperial')">US (ft+in/lbs)</button>
    </div>
    
    <div class="input-row">
        <label id="t-age">Yaşınız:</label>
        <input type="number" id="age" placeholder="Məs: 25">
    </div>

    <div class="input-row" id="height-container">
        <label id="t-height">Boyunuz (sm):</label>
        <input type="number" id="height" placeholder="Məs: 175">
    </div>
    <div class="input-row" id="height-imp-container" style="display:none;">
        <label id="t-height-imp">Boyunuz (ft/in):</label>
        <div class="dual-inputs">
            <input type="number" id="ft" placeholder="ft">
            <input type="number" id="in" placeholder="in">
        </div>
    </div>

    <div class="input-row">
        <label id="t-weight">Çəkiniz (kq):</label>
        <input type="number" id="weight" placeholder="Məs: 70">
    </div>

    <div class="btn-box">
        <button class="btn btn-main" id="t-calc" onclick="calculate()">Hesabla</button>
        <button class="btn btn-alt" id="t-clear" onclick="clearUI()">Təmizlə</button>
    </div>

    <div class="result-panel" id="res-panel">
        <p id="t-res-head" style="color:#718096; font-weight:600;">Sizin Nəticəniz:</p>
        <div class="bmi-val" id="bmi-num">0</div>
        <div class="bmi-cat" id="bmi-status">Normal</div>
        
        <div class="gauge-wrapper">
            <div id="gauge-labels-container" class="gauge-labels"></div>
            <div class="gauge-bar" id="gauge-bar"></div>
            <div class="ptr" id="ptr" style="left: 0%;"></div>
        </div>
    </div>
</div>

<div class="ad-spacer">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-7563994232518889"
         data-ad-slot="1234567890"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>

<div class="scientific-content">
    <div class="article-card" id="seo-area">
    </div>
</div>

<div class="footer-note" id="t-footer"></div>

<script>
    let currentLang = 'az';
    let currentUnit = 'metric';

    const data = {
        az: {
            h1: "Bədən Kütlə İndeksi Hesablayıcı", age: "Yaşınız:", height: "Boyunuz (sm):", weight: "Çəkiniz (kq):", calc: "Hesabla", clear: "Təmizlə", res: "Sizin Nəticəniz:", footer: "Qeyd: Bu hesablama yalnız məlumat xarakterlidir və fərdi fiziki xüsusiyyətlərinizə görə dəyişə bilər.",
            h_imp: "Boyunuz (ft/in):", w_imp: "Çəkiniz (lbs):",
            status: ["Ciddi Çəki Azlığı", "Çəki Azlığı", "Normal Çəki", "Artıq Çəki", "Piylənmə (I Dərəcə)", "Piylənmə (II Dərəcə)", "Morbid Piylənmə"],
            html: `
                <h2>1. Bədən Kütlə İndeksi (BKİ) Nədir?</h2>
                <p>Bədən Kütlə İndeksi (BKİ), fərdin çəkisinin boyuna olan nisbətini qiymətləndirmək üçün istifadə edilən praktik ölçü vahididir. Bu göstərici ümumi bədən quruluşunu anlamaq üçün əla başlanğıc nöqtəsidir.</p>
                <div class="math-box">BKİ = Çəki (kq) / (Boy (m) * Boy (m))</div>
                <h2>2. Standart BKİ Kateqoriyaları</h2>
                <table>
                    <tr><th>Təsnifat</th><th>BKİ Aralığı</th></tr>
                    <tr><td>Arıqlıq</td><td> < 18.5 </td></tr>
                    <tr><td><strong>Normal</strong></td><td><strong>18.5 - 25.0</strong></td></tr>
                    <tr><td>Artıq Çəki</td><td>25.0 - 30.0</td></tr>
                    <tr><td>Piylənmə</td><td> > 30.0 </td></tr>
                </table>
                <h2>3. Çəki Balansının Əhəmiyyəti</h2>
                <p>Düzgün çəki aralığında olmaq gündəlik enerji səviyyəsinə və fiziki aktivliyə müsbət təsir göstərir. Artıq çəki adətən mexaniki yükün artması ilə nəticələnir.</p>
                <h2>4. BMI Prime və Ponderal İndeksi</h2>
                <p><strong>BMI Prime:</strong> Bu göstərici indeksin ideal yuxarı həddə (25) olan nisbətidir. <strong>Ponderal İndeksi:</strong> Boyun kubunu (kg/m³) istifadə edərək bədən quruluşunu daha dəqiq analiz edir.</p>
                <h2>5. Gündəlik Aktivlik və Çəki Kontrolu</h2>
                <p>BKİ tək başına hər şeyi ifadə etmir. Əzələ kütləsi və gündəlik idman vərdişləri bu rəqəmlərin necə qiymətləndirilməsinə təsir edir.</p>
            `
        },
        ru: {
            h1: "Калькулятор Индекса Массы Тела", age: "Ваш возраст:", height: "Ваш рост (см):", weight: "Ваш вес (кг):", calc: "Рассчитать", clear: "Очистить", res: "Ваш Результат:", footer: "Примечание: Данный расчет носит справочный характер и может варьироваться в зависимости от индивидуальных особенностей.",
            h_imp: "Рост (фт/дюйм):", w_imp: "Вес (фунты):",
            status: ["Выраженный дефицит", "Дефицит веса", "Норма", "Избыточный вес", "Ожирение I", "Ожирение II", "Морбидное ожерение"],
            html: `
                <h2>1. Что такое Индекс Массы Тела (ИМТ)?</h2>
                <p>ИМТ — это практический способ оценки соотношения веса и роста человека. Этот метод широко используется для быстрого анализа физического состояния.</p>
                <div class="math-box">ИМТ = Вес (кг) / (Рост (м) * Рост (м))</div>
                <h2>2. Стандартные категории ИМТ</h2>
                <table>
                    <tr><th>Классификация</th><th>Диапазон ИМТ</th></tr>
                    <tr><td>Дефицит массы</td><td> < 18.5 </td></tr>
                    <tr><td><strong>Норма</strong></td><td><strong>18.5 - 25.0</strong></td></tr>
                    <tr><td>Избыточный вес</td><td>25.0 - 30.0</td></tr>
                    <tr><td>Ожирение</td><td> > 30.0 </td></tr>
                </table>
                <h2>3. Значение контроля веса</h2>
                <p>Поддержание оптимального веса помогает сохранять высокую энергичность и физическую выносливость.</p>
                <h2>4. BMI Prime и Индекс Пондераля</h2>
                <p><strong>BMI Prime:</strong> Отношение ИМТ к верхнему пределу нормы (25). <strong>Индекс Пондераля:</strong> Метод, использующий куб роста для более точного анализа.</p>
                <h2>5. Образ жизни и активность</h2>
                <p>ИМТ сам по себе не учитывает мышечную массу. Спортсменам следует рассматривать его в сочетании с другими параметрами тела.</p>
            `
        },
        en: {
            h1: "BMI Calculator Online", age: "Your Age:", height: "Your Height (cm):", weight: "Your Weight (kg):", calc: "Calculate", clear: "Clear", res: "Your Result:", footer: "Note: This calculation is for informational purposes and may vary based on individual physical characteristics.",
            h_imp: "Height (ft/in):", w_imp: "Weight (lbs):",
            status: ["Severe Thinness", "Underweight", "Normal Range", "Overweight", "Obese Class I", "Obese Class II", "Obese Class III"],
            html: `
                <h2>1. What is Body Mass Index (BMI)?</h2>
                <p>BMI is a practical measurement used to assess the relationship between a person's weight and height. It is a great starting point for understanding body composition.</p>
                <div class="math-box">BMI = Weight (kg) / (Height (m) * Height (m))</div>
                <h2>2. Standard BMI Categories</h2>
                <table>
                    <tr><th>Classification</th><th>BMI Range</th></tr>
                    <tr><td>Underweight</td><td> < 18.5 </td></tr>
                    <tr><td><strong>Normal</strong></td><td><strong>18.5 - 25.0</strong></td></tr>
                    <tr><td>Overweight</td><td>25.0 - 30.0</td></tr>
                    <tr><td>Obesity</td><td> > 30.0 </td></tr>
                </table>
                <h2>3. Importance of Weight Balance</h2>
                <p>Staying within a healthy weight range contributes to daily energy levels and physical performance.</p>
                <h2>4. BMI Prime and Ponderal Index</h2>
                <p><strong>BMI Prime:</strong> Ratio to the healthy upper limit (25). <strong>Ponderal Index:</strong> Uses height cubed (kg/m³) for body structure analysis.</p>
                <h2>5. Lifestyle and Activity</h2>
                <p>Factors like muscle mass and lifestyle habits play a significant role beyond just numbers.</p>
            `
        }
    };

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        const l = data[lang];
        document.getElementById('t-h1').innerText = l.h1;
        document.getElementById('t-age').innerText = l.age;
        document.getElementById('t-calc').innerText = l.calc;
        document.getElementById('t-clear').innerText = l.clear;
        document.getElementById('t-res-head').innerText = l.res;
        document.getElementById('t-footer').innerText = l.footer;
        document.getElementById('seo-area').innerHTML = l.html;
        setUnit(currentUnit); 
    }

    function setUnit(unit) {
        currentUnit = unit;
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`u-${unit}`).classList.add('active');
        const l = data[currentLang];

        if(unit === 'metric') {
            document.getElementById('height-container').style.display = 'block';
            document.getElementById('height-imp-container').style.display = 'none';
            document.getElementById('t-height').innerText = l.height;
            document.getElementById('t-weight').innerText = l.weight;
        } else {
            document.getElementById('height-container').style.display = 'none';
            document.getElementById('height-imp-container').style.display = 'block';
            document.getElementById('t-height-imp').innerText = l.h_imp;
            document.getElementById('t-weight').innerText = l.w_imp;
        }
    }

    function calculate() {
        let h_m, w_kg;
        if(currentUnit === 'metric') {
            const h_cm = document.getElementById('height').value;
            w_kg = document.getElementById('weight').value;
            h_m = h_cm / 100;
        } else {
            const ft = parseFloat(document.getElementById('ft').value) || 0;
            const inch = parseFloat(document.getElementById('in').value) || 0;
            const lbs = parseFloat(document.getElementById('weight').value) || 0;
            h_m = ((ft * 12) + inch) * 0.0254;
            w_kg = lbs * 0.453592;
        }

        if (h_m > 0.5 && w_kg > 10) {
            let bmi = w_kg / (h_m * h_m);
            bmi = bmi.toFixed(1);
            document.getElementById('bmi-num').innerText = bmi;
            document.getElementById('res-panel').style.display = 'block';
            let L = { u: 18.5, n: 25, o: 30 };
            const t = data[currentLang].status;
            let status = "", color = "";
            const max = 45;
            if (bmi < 16) { status = t[0]; color = "#3182ce"; }
            else if (bmi < 18.5) { status = t[1]; color = "#63b3ed"; }
            else if (bmi < 25) { status = t[2]; color = "#48bb78"; }
            else if (bmi < 30) { status = t[3]; color = "#ecc94b"; }
            else if (bmi < 35) { status = t[4]; color = "#ed8936"; }
            else if (bmi < 40) { status = t[5]; color = "#e53e3e"; }
            else { status = t[6]; color = "#9b2c2c"; }
            const sElem = document.getElementById('bmi-status');
            sElem.innerText = status; sElem.style.color = color;
            updateGauge(L, bmi, max);
            document.getElementById('res-panel').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function updateGauge(L, val, max) {
        const bar = document.getElementById('gauge-bar'), labs = document.getElementById('gauge-labels-container'), ptr = document.getElementById('ptr');
        bar.innerHTML = `<div style="width:${(L.u/max)*100}%; background:#63b3ed"></div><div style="width:${((L.n-L.u)/max)*100}%; background:#48bb78"></div><div style="width:${((L.o-L.n)/max)*100}%; background:#ecc94b"></div><div style="flex:1; background:#e53e3e"></div>`;
        labs.innerHTML = `<span style="position:absolute; left:0">0</span><span style="position:absolute; left:${(L.u/max)*100}%">${L.u}</span><span style="position:absolute; left:${(L.n/max)*100}%">${L.n}</span><span style="position:absolute; left:${(L.o/max)*100}%">${L.o}</span><span style="position:absolute; right:0">${max}+</span>`;
        ptr.style.left = Math.min((val/max)*100, 98) + '%';
    }

    function clearUI() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('res-panel').style.display = 'none';
    }
    window.onload = () => setLang('az');
</script>
</body>
</html>
