
<!DOCTYPE html>
<html lang="az">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W2GG8C5YXN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W2GG8C5YXN');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizlilik Siyasəti | BKİ Hesablayıcı</title>
    <style>
        :root { --primary-green: #4e7d5e; --bg-light: #f4f7f6; --text-main: #2d3748; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; line-height: 1.8; }
        .lang-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .lang-btn { padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .lang-btn.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }
        .container { background: white; width: 100%; max-width: 800px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { color: #1a202c; border-bottom: 3px solid var(--primary-green); padding-bottom: 10px; margin-bottom: 25px; }
        h2 { color: var(--primary-green); font-size: 20px; margin-top: 25px; }
        p { font-size: 15px; color: #4a5568; }
        .back-link { display: inline-block; margin-top: 30px; color: var(--primary-green); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="lang-bar">
    <button class="lang-btn active" id="btn-az" onclick="setLang('az')">Azərbaycan</button>
    <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">Русский</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
</div>
<div class="container" id="content-area"></div>
<script>
    const data = {
        az: { h1: "Gizlilik Siyasəti", back: "← Ana Səhifəyə Qayıt", html: `
            <p><strong>bkihesablama.site</strong> olaraq istifadəçilərimizin gizliliyi bizim üçün önəmlidir.</p>
            <h2>1. Toplanan Məlumatlar</h2><p>Saytımız istifadəçilərdən heç bir şəxsi identifikasiya məlumatı (ad, telefon və s.) tələb etmir və saxlamır. Hesablamalar zamanı daxil edilən yaş, boy və çəki məlumatları yalnız nəticəni göstərmək üçün istifadə olunur və serverlərimizdə qeyd edilmir.</p>
            <h2>2. Google AdSense və Kukilər</h2><p>Saytımızda göstərilən reklamlar Google tərəfindən idarə olunur. Google reklamları sizin maraqlarınıza uyğunlaşdırmaq üçün kukilərdən (cookies) istifadə edə bilər.</p>
            <h2>3. Üçüncü Tərəf Keçidləri</h2><p>Saytımızda digər resurslara keçidlər ola bilər. Həmin saytların gizlilik siyasətinə görə məsuliyyət daşımırıq.</p>` },
        ru: { h1: "Политика конфиденциальности", back: "← На главную", html: `
            <p>Конфиденциальность наших пользователей важна для <strong>bkihesablama.site</strong>.</p>
            <h2>1. Собираемые данные</h2><p>Наш сайт не требует и не хранит личную идентификационную информацию (имя, телефон и т.д.). Данные о возрасте, росте и весе, вводимые при расчетах, используются только для вывода результата и не сохраняются на серверах.</p>
            <h2>2. Google AdSense и файлы cookie</h2><p>Объявления на сайте управляются Google. Google может использовать файлы cookie для настройки рекламы в соответствии с вашими интересами.</p>
            <h2>3. Сторонние ссылки</h2><p>Наш сайт может содержать ссылки на другие ресурсы. Мы не несем ответственности за политику конфиденциальности этих сайтов.</p>` },
        en: { h1: "Privacy Policy", back: "← Back to Home", html: `
            <p>Privacy of our users is important for <strong>bkihesablama.site</strong>.</p>
            <h2>1. Data Collection</h2><p>Our site does not require or store personal identification information (name, phone, etc.). Age, height, and weight data entered during calculations are used only to show results and are not recorded on our servers.</p>
            <h2>2. Google AdSense and Cookies</h2><p>Ads on the site are managed by Google. Google may use cookies to customize ads according to your interests.</p>
            <h2>3. Third-Party Links</h2><p>Our site may contain links to other resources. We are not responsible for the privacy policies of those sites.</p>` }
    };
    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        const l = data[lang];
        document.getElementById('content-area').innerHTML = `<h1>${l.h1}</h1>${l.html}<a href="index.html" class="back-link">${l.back}</a>`;
    }
    window.onload = () => setLang('az');
</script>
</body>
</html>
