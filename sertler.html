<!DOCTYPE html>
<html lang="az">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W2GG8C5YXN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstifadə Şərtləri | BKİ Hesablayıcı</title>
    <style>
        :root { --primary-green: #4e7d5e; --bg-light: #f4f7f6; --text-main: #2d3748; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; line-height: 1.8; }
        .lang-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .lang-btn { padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .lang-btn.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }
        .container { background: white; width: 100%; max-width: 800px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { color: #1a202c; border-bottom: 3px solid var(--primary-green); padding-bottom: 10px; margin-bottom: 25px; }
        h2 { color: var(--primary-green); font-size: 20px; margin-top: 25px; }
        p { font-size: 15px; color: #4a5568; }
        .back-link { display: inline-block; margin-top: 30px; color: var(--primary-green); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="lang-bar">
    <button class="lang-btn active" id="btn-az" onclick="setLang('az')">Azərbaycan</button>
    <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">Русский</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
</div>
<div class="container" id="content-area"></div>
<script>
    const data = {
        az: { h1: "İstifadə Şərtləri", back: "← Ana Səhifəyə Qayıt", html: `
            <h2>1. Tibbi Məsuliyyətdən İmtina</h2><p>Bu veb-saytdakı BKİ hesablamaları yalnız məlumat xarakterlidir. Bu nəticələr peşəkar tibbi məsləhət, diaqnoz və ya müalicəni əvəz etmir.</p>
            <h2>2. İstifadə Məhdudiyyətləri</h2><p>Saytın məzmununu kopyalamaq və kommersiya məqsədləri üçün istifadə etmək qadağandır. Saytın fəaliyyətinə zərər verəcək hər hansı texniki müdaxilə yolverilməzdir.</p>
            <h2>3. Məsuliyyətin Həddi</h2><p>Biz hesablamaların 100% dəqiqliyinə zəmanət vermirik. İstifadəçinin bu məlumatlar əsasında atdığı addımlara görə sayt rəhbərliyi məsuliyyət daşımır.</p>` },
        ru: { h1: "Условия использования", back: "← На главную", html: `
            <h2>1. Отказ от медицинской ответственности</h2><p>Расчеты ИМТ на этом сайте носят ознакомительный характер. Эти результаты не заменяют профессиональную медицинскую консультацию, диагностику или лечение.</p>
            <h2>2. Ограничения использования</h2><p>Запрещается копировать содержимое сайта и использовать его в коммерческих целях. Любое техническое вмешательство в работу сайта недопустимо.</p>
            <h2>3. Ограничение ответственности</h2><p>Мы не гарантируем 100% точность расчетов. Администрация сайта не несет ответственности за действия пользователя, основанные на этой информации.</p>` },
        en: { h1: "Terms of Service", back: "← Back to Home", html: `
            <h2>1. Medical Disclaimer</h2><p>BMI calculations on this website are for informational purposes only. These results do not replace professional medical advice, diagnosis, or treatment.</p>
            <h2>2. Usage Restrictions</h2><p>It is forbidden to copy the content of the site and use it for commercial purposes. Any technical interference with the site's operation is unacceptable.</p>
            <h2>3. Limitation of Liability</h2><p>We do not guarantee 100% accuracy of calculations. The site administration is not responsible for actions taken by the user based on this information.</p>` }
    };
    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        const l = data[lang];
        document.getElementById('content-area').innerHTML = `<h1>${l.h1}</h1>${l.html}<a href="index.html" class="back-link">${l.back}</a>`;
    }
    window.onload = () => setLang('az');
</script>
</body>
</html>
